networks:
  ptero_internal:
    driver: bridge
  ptero_public:
    driver: bridge
  wings0:
    name: wings0
    driver: bridge

services:
  # --- Database: MariaDB ---
  database:
    image: mariadb:10.11
    container_name: ptero_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --skip-ssl
    volumes:
      - ./database:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "GANTI_PASSWORD_ROOT_DATABASE"
      MYSQL_DATABASE: panel
      MYSQL_USER: pterodactyl
      MYSQL_PASSWORD: "GANTI_PASSWORD_DATABASE"
      TZ: Asia/Jakarta
    networks:
      - ptero_internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u pterodactyl -pGANTI_PASSWORD_DATABASE || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache & Queue: Redis ---
  redis:
    image: redis:7-alpine
    container_name: ptero_redis
    restart: unless-stopped
    command: redis-server --requirepass "GANTI_PASSWORD_REDIS"
    environment:
      TZ: Asia/Jakarta
    networks:
      - ptero_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "GANTI_PASSWORD_REDIS", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Pterodactyl Panel ---
  panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: ptero_panel
    restart: unless-stopped
    depends_on:
      - database
      - redis
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./panel/var:/app/var
      - ./panel/nginx:/etc/nginx/http.d
      - ./logs:/app/storage/logs
    networks:
      - ptero_internal
      - ptero_public
    environment:
      APP_URL: "https://${CODESPACE_NAME}-80.app.github.dev"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_TIMEZONE: Asia/Jakarta
      APP_SERVICE_AUTHOR: "admin@yourdomain.com"
      TRUSTED_PROXIES: "*"
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: "GANTI_PASSWORD_DATABASE"
      DB_COMMON_FLAGS: "--skip-ssl"
      MYSQL_ATTR_SSL_CA: null
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: "GANTI_PASSWORD_REDIS"

  # --- Pterodactyl Wings ---
  wings:
    image: ghcr.io/pterodactyl/wings:latest
    container_name: pterodactyl_wings
    restart: unless-stopped
    tty: true
    ports:
      - "8080:8080"
      - "2022:2022"
    environment:
      TZ: "Asia/Jakarta"
      WINGS_UID: 988
      WINGS_GID: 988
      WINGS_USERNAME: pterodactyl
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./wings/etc:/etc/pterodactyl # Diperbaiki: Jalur lokal ke ./wings/etc
      - ./wings/var/lib:/var/lib/pterodactyl # Diperbaiki: Menggunakan folder lokal
      - ./wings/var/log:/var/log/pterodactyl # Diperbaiki: Menggunakan folder lokal
      - /tmp/pterodactyl:/tmp/pterodactyl
      - /etc/ssl/certs:/etc/ssl/certs:ro
    networks:
      - wings0
      - ptero_public
